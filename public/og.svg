<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f10"/>
      <stop offset="100%" stop-color="#1c1c20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9c9c9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dot grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="60" cy="60" r="2"/>
    <circle cx="120" cy="60" r="2"/>
    <circle cx="180" cy="60" r="2"/>
    <circle cx="60" cy="120" r="2"/>
    <circle cx="120" cy="120" r="2"/>
    <circle cx="180" cy="120" r="2"/>
    <circle cx="1140" cy="570" r="2"/>
    <circle cx="1080" cy="570" r="2"/>
    <circle cx="1020" cy="570" r="2"/>
  </g>

  <!-- QR icon (left) -->
  <g transform="translate(90, 155) scale(10)">
    <rect width="32" height="32" rx="6" fill="#ffffff"/>
    <g fill="#0a0a0a">
      <rect x="5" y="5" width="8" height="8" rx="1"/>
      <rect x="19" y="5" width="8" height="8" rx="1"/>
      <rect x="5" y="19" width="8" height="8" rx="1"/>
    </g>
    <g fill="#ffffff">
      <rect x="7" y="7" width="4" height="4"/>
      <rect x="21" y="7" width="4" height="4"/>
      <rect x="7" y="21" width="4" height="4"/>
    </g>
    <g fill="#0a0a0a">
      <rect x="15" y="5" width="2" height="2"/>
      <rect x="15" y="9" width="2" height="2"/>
      <rect x="15" y="13" width="2" height="2"/>
      <rect x="15" y="17" width="2" height="2"/>
      <rect x="15" y="21" width="2" height="2"/>
      <rect x="15" y="25" width="2" height="2"/>
      <rect x="19" y="15" width="2" height="2"/>
      <rect x="23" y="15" width="2" height="2"/>
      <rect x="5" y="15" width="2" height="2"/>
      <rect x="9" y="15" width="2" height="2"/>
      <rect x="19" y="19" width="2" height="2"/>
      <rect x="23" y="23" width="2" height="2"/>
      <rect x="25" y="19" width="2" height="2"/>
      <rect x="19" y="25" width="2" height="2"/>
    </g>
  </g>

  <!-- Text -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif" fill="url(#accent)">
    <text x="500" y="265" font-size="96" font-weight="800" letter-spacing="-2">QR Resizer</text>
    <text x="500" y="330" font-size="32" font-weight="500" fill="#a1a1aa">Regenerate any QR code in high quality</text>
    <text x="500" y="380" font-size="26" font-weight="400" fill="#71717a">PNG · SVG · up to 2048px · 100% browser-based</text>
  </g>

  <!-- Bottom line -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif" fill="#71717a">
    <text x="500" y="500" font-size="22" font-weight="400">Upload → Decode → Resize → Download</text>
  </g>
</svg>
